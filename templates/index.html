<!doctype html>
<html>
<head>
  <title>Spotify Song Recommender</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.0.2/css/bootstrap.min.css">
  <style>
    #autocomplete-items {
      position: absolute;
      border: 1px solid #d4d4d4;
      border-bottom: none;
      z-index: 99;
      top: 100%;
      left: 0;
      right: 0;
    }
    #autocomplete-items div {
      padding: 10px;
      cursor: pointer;
      background-color: #fff;
      border-bottom: 1px solid #d4d4d4;
    }
    #autocomplete-items div:hover {
      background-color: #e9e9e9;
    }
    .bar {
      fill: steelblue;
    }
    .bar:hover {
      fill: brown;
    }
    .audio-feature-label {
      font: 12px sans-serif;
      text-anchor: middle;
    }
    .axis--x path {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="text-center">Spotify Song Recommender</h1>
    <p class="lead text-center">Find similar songs based on audio features, genre, and subgenre</p>
    
    <form id="query-form" class="row g-2">
      <div class="col-md-6">
        <input type="text" id="track-input" class="form-control" placeholder="Enter a song" autocomplete="off">
        <div id="autocomplete-items"></div>
      </div>
      
      <div class="col-md-3">
        <select id="metric-select" class="form-select">
          <option value="cosine">Cosine Similarity</option>
          <option value="euclidean">Euclidean Distance</option>
        </select>
      </div>

      <div class="col-md-3">  
        <select id="n-select" class="form-select">
          <option>5</option>
          <option>10</option>
          <option>15</option>
        </select>
      </div>
      
      <div class="col-12">
        <select id="subgenre-select" class="form-select" multiple>
          {% for subgenre in subgenres %}
            <option value="{{ subgenre }}">{{ subgenre }}</option>
          {% endfor %}
        </select>
        <small class="form-text text-muted">Optionally filter by Spotify subgenres</small>
      </div>
      
      <div class="col-12">
        <button type="submit" class="btn btn-primary">Find Similar Songs</button>
      </div>
    </form>

    <div id="results" class="mt-3"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.0.0/d3.min.js"></script>
  <script>
    const trackInput = document.getElementById('track-input');
    const metricsSelect = document.getElementById('metric-select');
    const nSelect = document.getElementById('n-select');
    const subgenreSelect = document.getElementById('subgenre-select');
    const autocompleteItems = document.getElementById('autocomplete-items');
    const resultsDiv = document.getElementById('results');
    const queryForm = document.getElementById('query-form');

    queryForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const track = trackInput.value;
      const metric = metricsSelect.value;
      const n = nSelect.value;
      const subgenres = [...subgenreSelect.selectedOptions].map(o => o.value);

      const res = await fetch('/api/recommend', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({track, n, metric, subgenres}),
      });
      const data = await res.json();

      if (!data.found) {
        resultsDiv.innerHTML = `<p class="text-danger">${data.message}</p>`;
        return;
      }

      let html = `
        <h2>Results for "${data.query.track}"</h2>
        <p>Showing top ${data.results.length} songs by ${data.metric} similarity${data.subgenres.length ? ` filtered by subgenre(s): ${data.subgenres.join(', ')}` : ''}.</p>
        <ol class="list-group">
      `;

      data.results.forEach(r => {
        html += `
          <li class="list-group-item">
            <div class="row">
              <div class="col-8">
                <h5>${r.track_name}</h5>
                <p class="mb-1">${r.track_artist} (${r.year})</p>
                <p><small>${data.metric} score: ${r.score.toFixed(3)}</small></p>
              </div>
              <div class="col-4">
                <svg class="audio-feature-chart"></svg>
              </div>
            </div>
          </li>
        `;
      });

      html += `</ol>`;
      resultsDiv.innerHTML = html;

      // Render audio feature bar charts
      const svgs = document.querySelectorAll('svg.audio-feature-chart');
      svgs.forEach((svg, i) => renderAudioFeatureChart(svg, data.results[i].audio_features));
    });

    trackInput.addEventListener('input', async () => {
      const q = trackInput.value;
      if (!q) {
        autocompleteItems.innerHTML = '';
        return;
      }

      const res = await fetch(`/api/suggest?q=${encodeURIComponent(q)}`);
      const matches = await res.json();

      let html = '';
      matches.forEach(match => {
        html += `<div>${match}</div>`;  
      });
      autocompleteItems.innerHTML = html;

      autocompleteItems.querySelectorAll('div').forEach(div => {
        div.addEventListener('click', () => {
          trackInput.value = div.textContent;
          autocompleteItems.innerHTML = '';
        });
      });
    });

    function renderAudioFeatureChart(svg, features) {
      const width = 300;
      const height = 150;

      const x = d3.scaleLinear()
          .rangeRound([0, width])
          .domain(d3.extent(Object.values(features)));

      const y = d3.scaleBand()
          .rangeRound([0, height])
          .domain(Object.keys(features))
          .padding(0.2);

      const g = d3.select(svg)
          .attr('width', width)
          .attr('height', height)
        .append('g');

      g.selectAll('.bar')
        .data(Object.entries(features))
        .enter().append('rect') 
          .attr('class', 'bar')
          .attr('y', d => y(d[0]))
          .attr('width', d => x(d[1]))
          .attr('height', y.bandwidth());

      g.append('g')
          .attr('transform', `translate(0,${height})`) 
          .call(d3.axisBottom(x));

      g.append('g')
        .append('line')
          .attr('y1', 0)
          .attr('y2', height);

      g.selectAll('.audio-feature-label')
          .data(Object.keys(features))
        .enter().append('text')
          .attr('class', 'audio-feature-label')
          .attr('y', d => y(d) + y.bandwidth() / 2)
          .attr('x', -5)
          .attr('dy', '0.35em')
          .text(d => d);
    }
  </script>
</body>
</html>
